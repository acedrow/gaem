name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # Build first: the client imports @gaem/shared from dist/, and the
      # type-aware lint rules on the backends resolve types from dist/ too.
      - run: npm run build
      - run: npm run lint
      - run: npm run test

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/cache@v4
        with:
          path: packages/e2e/.playwright-browsers
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium
        working-directory: packages/e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/packages/e2e/.playwright-browsers

      - run: npm run test:e2e
        env:
          GM_PASSWORD: e2e-gm
          PLAYER_PASSWORD: e2e-player
          AUTH_SECRET: e2e-secret
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/packages/e2e/.playwright-browsers

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7
